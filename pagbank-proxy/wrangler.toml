name = "voltris-pagbank-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Rota — após deploy, configure no dashboard da Cloudflare
# ou use o subdomínio padrão: voltris-pagbank-proxy.<seu-usuario>.workers.dev

[vars]
PAGBANK_ENV = "sandbox"

# PAGBANK_TOKEN e PROXY_SECRET devem ser adicionados como secrets:
# wrangler secret put PAGBANK_TOKEN
# wrangler secret put PROXY_SECRET
