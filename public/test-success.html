<!DOCTYPE html>
<html>
<head>
    <title>Teste Página Sucesso</title>
</head>
<body>
    <h1>Testando acesso à página de sucesso</h1>
    
    <button onclick="testSuccess()">Testar Página de Sucesso</button>
    
    <div id="result"></div>
    
    <script>
        async function testSuccess() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testando...</p>';
            
            try {
                // Criar pagamento simulado
                const paymentResponse = await fetch('/api/pagamento/simular-pagamento', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plan: 'pro',
                        email: 'teste-browser@voltris.com.br',
                        fullName: 'Teste Browser',
                        simulateApproved: true
                    })
                });
                
                const paymentData = await paymentResponse.json();
                console.log('Pagamento criado:', paymentData);
                
                if (!paymentData.success) {
                    throw new Error('Falha ao criar pagamento simulado');
                }
                
                // Construir URL
                const successUrl = `/sucesso?preference_id=${paymentData.payment.preference_id}&status=approved&payment_id=${paymentData.payment.payment_id}`;
                
                resultDiv.innerHTML = `
                    <p><strong>Sucesso!</strong> Pagamento criado.</p>
                    <p><strong>URL:</strong> <a href="${successUrl}" target="_blank">${successUrl}</a></p>
                    <p>Clique no link acima para abrir a página de sucesso em uma nova aba.</p>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Erro: ${error.message}</p>`;
                console.error('Erro:', error);
            }
        }
    </script>
</body>
</html>
